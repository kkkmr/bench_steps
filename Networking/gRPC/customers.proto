syntax = "proto3";

service CustomerService {
    rpc GetAll (Empty) returns (CustomerList) {}
    rpc Get (CustomerRequestId) returns (Customer) {}
    rpc Insert (Customer) returns (Customer) {}
    rpc Update (Customer) returns (Customer) {}
    rpc Remove (CustomerRequestId) returns (Empty) {}
}

message Empty {}

message CustomerRequestId {
    // here number is like indexing i.e sequence which helps in serialization/deserialization
    // and do not change the number once the server is up. Keep on adding
    // it also helps in backward compatibility
    string id=1;
}

message CustomerList {
    // repeated is keyword, used to repeat the datatypes
    repeated Customer customers = 1;
}

message Customer {
    string id = 1;
    string name = 2;
    int32 age = 3;
    string address = 4;
}